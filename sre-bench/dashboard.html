<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SREBench Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0f1419;
            color: #e0e6ed;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 20px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 5px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            background: #1a1f2e;
            border: 1px solid #2a3142;
            border-radius: 8px;
            padding: 20px;
        }
        .panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .task-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .task-btn {
            padding: 12px;
            background: #2a3142;
            border: 1px solid #667eea;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95em;
        }
        .task-btn:hover {
            background: #667eea;
            color: white;
        }
        .task-btn.active {
            background: #667eea;
            color: white;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-healthy { background: #22c55e; }
        .status-degraded { background: #f59e0b; }
        .status-down { background: #ef4444; }
        .service-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .service-card {
            background: #2a3142;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
        }
        .service-name {
            font-weight: bold;
            color: #e0e6ed;
            margin-bottom: 5px;
        }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.85em;
            color: #a0aec0;
        }
        .metric {
            display: flex;
            justify-content: space-between;
        }
        .action-selector {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a3142;
        }
        .action-type {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #a0aec0;
            font-size: 0.9em;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px 12px;
            background: #2a3142;
            border: 1px solid #3a4556;
            color: #e0e6ed;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.95em;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #764ba2;
        }
        .btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .response {
            background: #2a3142;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #3a4556;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.85em;
            font-family: monospace;
        }
        .response-title {
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .response-content {
            white-space: pre-wrap;
            word-break: break-all;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-box {
            background: #2a3142;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-box .label {
            font-size: 0.85em;
            color: #a0aec0;
            margin-bottom: 5px;
        }
        .stat-box .value {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
        }
        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #667eea;
        }
        .error {
            background: #7f1d1d;
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
        }
        .success {
            background: #1f3a1f;
            border: 1px solid #22c55e;
            color: #86efac;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚨 SREBench Interactive Dashboard</h1>
        <p>Test incidents and track your agent's performance</p>
    </div>
    
    <div class="container">
        <!-- Left Panel -->
        <div>
            <div class="panel">
                <h2>📋 Select Scenario</h2>
                <div class="task-selector" id="taskSelector"></div>
            </div>
            
            <div class="panel">
                <h2>🔧 System Status</h2>
                <div class="service-list" id="serviceList"></div>
                <div class="stats-grid" style="margin-top: 15px;">
                    <div class="stat-box">
                        <div class="label">Steps Taken</div>
                        <div class="value" id="stepCount">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="label">Reward</div>
                        <div class="value" id="rewardValue">0.00</div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <h2>⚡ Execute Action</h2>
                <div class="action-type">
                    <label>Action Type</label>
                    <select id="actionType">
                        <option value="investigate">Investigate</option>
                        <option value="diagnose">Diagnose</option>
                        <option value="remediate">Remediate</option>
                        <option value="give_up">Give Up</option>
                    </select>
                </div>
                <div class="action-type">
                    <label>Command</label>
                    <input type="text" id="command" placeholder="e.g., restart, increase_pool, flush_cache">
                </div>
                <div class="action-type">
                    <label>Target Service</label>
                    <select id="target">
                        <option value="api-gateway">api-gateway</option>
                        <option value="user-service">user-service</option>
                        <option value="payment-service">payment-service</option>
                        <option value="database-primary">database-primary</option>
                        <option value="database-replica">database-replica</option>
                        <option value="cache-redis">cache-redis</option>
                    </select>
                </div>
                <button class="btn" onclick="executeAction()">Execute Action</button>
                <button class="btn" style="background: #764ba2;" onclick="getGrade()">Get Score</button>
            </div>
        </div>
        
        <!-- Right Panel -->
        <div class="right-panel">
            <div class="panel">
                <div class="response-title">📊 API Response</div>
                <div class="loader" id="loader">Loading...</div>
                <div class="response-content" id="responseContent">
                    <div style="color: #a0aec0;">Click a scenario above to start</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/';
        let currentTask = null;
        let episodeData = null;

        async function initDashboard() {
            // Load tasks
            try {
                const response = await fetch(API_URL + 'tasks');
                const data = await response.json();
                const selector = document.getElementById('taskSelector');
                
                data.tasks.forEach(task => {
                    const btn = document.createElement('button');
                    btn.className = 'task-btn';
                    btn.textContent = `${task.name} (${task.difficulty})`;
                    btn.onclick = () => selectTask(task.id, task.name, btn);
                    selector.appendChild(btn);
                });
            } catch (e) {
                showError('Failed to load tasks: ' + e.message);
            }
        }

        async function selectTask(taskId, taskName, btnElement) {
            currentTask = taskId;
            document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            showLoading(true);
            try {
                const response = await fetch(API_URL + 'reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({task_id: taskId})
                });
                
                episodeData = await response.json();
                updateDashboard(episodeData);
                showResponse(JSON.stringify(episodeData, null, 2));
                showSuccess(`Started task: ${taskName}`);
            } catch (e) {
                showError('Failed to reset: ' + e.message);
            } finally {
                showLoading(false);
            }
        }

        async function executeAction() {
            if (!currentTask) {
                showError('No task selected. Choose a scenario first.');
                return;
            }
            
            const action = {
                action_type: document.getElementById('actionType').value,
                command: document.getElementById('command').value,
                target: document.getElementById('target').value,
                params: {}
            };
            
            showLoading(true);
            try {
                const response = await fetch(API_URL + 'step', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(action)
                });
                
                const result = await response.json();
                if (result.observation) {
                    episodeData = result.observation;
                    updateDashboard(result.observation);
                }
                showResponse(JSON.stringify(result, null, 2));
                
                if (result.done) {
                    showSuccess('Incident resolved!');
                }
            } catch (e) {
                showError('Action failed: ' + e.message);
            } finally {
                showLoading(false);
            }
        }

        async function getGrade() {
            if (!currentTask) {
                showError('No task in progress.');
                return;
            }
            
            showLoading(true);
            try {
                const response = await fetch(API_URL + 'grader');
                const grade = await response.json();
                showResponse(JSON.stringify(grade, null, 2));
                showSuccess(`Final Score: ${grade.score.toFixed(2)}/1.00`);
            } catch (e) {
                showError('Failed to get grade: ' + e.message);
            } finally {
                showLoading(false);
            }
        }

        function updateDashboard(obs) {
            // Update services
            if (obs.system_dashboard) {
                const serviceList = document.getElementById('serviceList');
                serviceList.innerHTML = '';
                
                obs.system_dashboard.forEach(svc => {
                    const statusClass = `status-${svc.status}`;
                    const card = document.createElement('div');
                    card.className = 'service-card';
                    card.innerHTML = `
                        <div class="service-name">
                            <span class="status-indicator ${statusClass}"></span>${svc.name}
                        </div>
                        <div class="metrics">
                            <div class="metric"><span>CPU:</span> <span>${svc.cpu_percent.toFixed(1)}%</span></div>
                            <div class="metric"><span>Mem:</span> <span>${svc.memory_percent.toFixed(1)}%</span></div>
                            <div class="metric"><span>Errors:</span> <span>${svc.error_rate_percent.toFixed(1)}%</span></div>
                            <div class="metric"><span>P99:</span> <span>${svc.latency_p99_ms.toFixed(0)}ms</span></div>
                        </div>
                    `;
                    serviceList.appendChild(card);
                });
            }
            
            // Update stats
            if (obs.steps_taken !== undefined) {
                document.getElementById('stepCount').textContent = obs.steps_taken;
            }
        }

        function showLoading(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function showResponse(text) {
            const el = document.getElementById('responseContent');
            el.innerHTML = `<div class="response-content">${escapeHtml(text)}</div>`;
        }

        function showError(msg) {
            const el = document.getElementById('responseContent');
            el.innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
        }

        function showSuccess(msg) {
            const el = document.getElementById('responseContent');
            el.innerHTML += `<div class="success">${escapeHtml(msg)}</div>`;
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Initialize on load
        window.onload = initDashboard;
    </script>
</body>
</html>

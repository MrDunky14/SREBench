<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SREBench War Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080a10;
            --panel-bg: rgba(16, 21, 36, 0.65);
            --border-color: rgba(65, 84, 140, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #8b9bb4;
            --neon-blue: #00f0ff;
            --neon-purple: #b026ff;
            --neon-red: #ff003c;
            --neon-green: #00ff88;
            --neon-yellow: #ffb800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(176, 38, 255, 0.05) 0%, transparent 25%);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr 400px;
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
        }

        .glass-panel h2 {
            font-size: 1.1rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .glass-panel h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Task Selector */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
            padding-right: 5px;
        }

        .task-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .task-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-blue);
            transform: translateX(5px);
        }

        .task-btn.active {
            background: rgba(176, 38, 255, 0.15);
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.3);
        }

        /* Center Dashboard */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .service-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--neon-green);
        }

        .service-card.degraded::before {
            background: var(--neon-yellow);
            box-shadow: 0 0 10px var(--neon-yellow);
        }

        .service-card.down::before {
            background: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .service-name {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .status-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 12px;
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .degraded .status-badge {
            background: rgba(255, 184, 0, 0.1);
            color: var(--neon-yellow);
            border-color: rgba(255, 184, 0, 0.2);
        }

        .down .status-badge {
            background: rgba(255, 0, 60, 0.1);
            color: var(--neon-red);
            border-color: rgba(255, 0, 60, 0.2);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        /* Action Panel */
        .action-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        select, input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            color: var(--neon-blue);
            padding: 10px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .btn {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .btn-purple {
            color: var(--neon-purple);
            border-color: var(--neon-purple);
        }

        .btn-purple:hover {
            background: rgba(176, 38, 255, 0.1);
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.4);
        }

        .btn-group {
            display: flex;
            gap: 16px;
        }

        /* Right Panel - Terminal */
        .terminal {
            background: #000;
            border-radius: 8px;
            padding: 16px;
            flex-grow: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #00ff00;
            overflow-y: auto;
            border: 1px solid #333;
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.05);
            position: relative;
        }

        .terminal::before {
            content: "SRE_SHELL v2.4.1";
            display: block;
            color: #666;
            margin-bottom: 10px;
            border-bottom: 1px dashed #333;
            padding-bottom: 5px;
        }

        .log-entry {
            margin-bottom: 8px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-system { color: #888; }
        .log-success { color: var(--neon-green); }
        .log-error { color: var(--neon-red); }
        .log-data { color: var(--neon-blue); }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon-purple);
            text-shadow: 0 0 10px rgba(176, 38, 255, 0.3);
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>SREBench War Room</h1>
        <p>Autonomous Incident Response Interface</p>
    </div>

    <div class="container">
        <!-- Left: Scenario Selection -->
        <div class="glass-panel">
            <h2>Select Incident</h2>
            <div class="task-list" id="taskSelector">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Center: Dashboard & Controls -->
        <div class="glass-panel" style="display: flex; flex-direction: column;">
            <h2>System Telemetry</h2>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="metric-label">SLA Remaining</div>
                    <div class="stat-val" id="slaTimer" style="color: var(--neon-green)">30:00</div>
                </div>
                <div class="stat-item">
                    <div class="metric-label">Steps Taken</div>
                    <div class="stat-val" id="stepCount" style="color: var(--neon-blue)">0</div>
                </div>
                <div class="stat-item">
                    <div class="metric-label">Current Reward</div>
                    <div class="stat-val" id="rewardValue">0.00</div>
                </div>
            </div>

            <div class="service-grid" id="serviceList">
                <!-- Populated by JS -->
                <div style="color: var(--text-muted); text-align: center; width: 100%; padding: 40px;">
                    Awaiting incident injection...
                </div>
            </div>

            <div style="margin-top: auto;">
                <h2>Command Interface</h2>
                <div class="action-form">
                    <div class="form-group">
                        <label>Action Type</label>
                        <select id="actionType">
                            <option value="investigate">Investigate</option>
                            <option value="diagnose">Diagnose</option>
                            <option value="remediate">Remediate</option>
                            <option value="give_up">Give Up</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Command</label>
                        <input type="text" id="command" placeholder="e.g., check_logs, restart">
                    </div>
                    <div class="form-group">
                        <label>Target</label>
                        <select id="target">
                            <option value="api-gateway">api-gateway</option>
                            <option value="user-service">user-service</option>
                            <option value="payment-service">payment-service</option>
                            <option value="database-primary">database-primary</option>
                            <option value="database-replica">database-replica</option>
                            <option value="cache-redis">cache-redis</option>
                        </select>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn" onclick="executeAction()" style="flex: 2;">
                        <span id="btnLoader" class="loader"></span>
                        <span id="btnText">Execute Payload</span>
                    </button>
                    <button class="btn btn-purple" onclick="getGrade()" style="flex: 1;">
                        Evaluate
                    </button>
                </div>
            </div>
        </div>

        <!-- Right: Terminal -->
        <div class="glass-panel" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
            <div style="padding: 16px 24px; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.5);">
                <h2>Terminal Stream</h2>
            </div>
            <div class="terminal" id="terminal">
                <div class="log-entry log-system">System initialized. Awaiting commands.</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/';
        let currentTask = null;

        // Utility to format JSON nicely
        function syntaxHighlight(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            return json;
        }

        function appendLog(message, type = 'system') {
            const terminal = document.getElementById('terminal');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toISOString().split('T')[1].substring(0,8);
            entry.textContent = `[${time}] ${message}`;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function initDashboard() {
            try {
                const response = await fetch(API_URL + 'tasks');
                const data = await response.json();
                const selector = document.getElementById('taskSelector');
                
                data.tasks.forEach(task => {
                    const btn = document.createElement('button');
                    btn.className = 'task-btn';
                    btn.innerHTML = `<strong>${task.id}</strong><br><span style="font-size: 0.75rem; color: var(--text-muted);">${task.difficulty.toUpperCase()}</span>`;
                    btn.onclick = () => selectTask(task.id, btn);
                    selector.appendChild(btn);
                });
                appendLog(`Loaded ${data.tasks.length} simulation scenarios.`, 'success');
            } catch (e) {
                appendLog('CRITICAL FAILURE: Cannot connect to OpenEnv API. ' + e.message, 'error');
            }
        }

        async function selectTask(taskId, btnElement) {
            currentTask = taskId;
            document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            appendLog(`Initializing incident injection protocol: ${taskId}...`, 'system');
            
            try {
                const response = await fetch(API_URL + 'reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({task_id: taskId})
                });
                
                const data = await response.json();
                updateTelemetry(data);
                
                if (data.alert_message) {
                    appendLog(data.alert_message, 'error');
                } else {
                    appendLog("Episode started successfully.", 'success');
                }
            } catch (e) {
                appendLog('Injection failed: ' + e.message, 'error');
            }
        }

        async function executeAction() {
            if (!currentTask) {
                appendLog('ERROR: Select an incident scenario before execution.', 'error');
                return;
            }
            
            const action = {
                action_type: document.getElementById('actionType').value,
                command: document.getElementById('command').value,
                target: document.getElementById('target').value,
                params: {}
            };
            
            const btn = document.querySelector('.btn');
            document.getElementById('btnText').style.display = 'none';
            document.getElementById('btnLoader').style.display = 'block';
            btn.style.pointerEvents = 'none';

            appendLog(`> ${action.command} ${action.target}`, 'system');

            try {
                const response = await fetch(API_URL + 'step', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(action)
                });
                
                const result = await response.json();
                
                if (result.observation) {
                    updateTelemetry(result.observation);
                    if (result.observation.last_action_result) {
                        appendLog(result.observation.last_action_result, 'data');
                    }
                }
                
                if (result.reward !== undefined) {
                    document.getElementById('rewardValue').textContent = result.reward.toFixed(3);
                }

                if (result.done) {
                    appendLog('INCIDENT RESOLVED OR TERMINATED.', 'success');
                    getGrade();
                }
            } catch (e) {
                appendLog('Execution aborted: ' + e.message, 'error');
            } finally {
                document.getElementById('btnText').style.display = 'block';
                document.getElementById('btnLoader').style.display = 'none';
                btn.style.pointerEvents = 'auto';
            }
        }

        async function getGrade() {
            if (!currentTask) return;
            
            appendLog('Evaluating performance against baseline...', 'system');
            try {
                const response = await fetch(API_URL + 'grader');
                const grade = await response.json();
                
                appendLog(`EVALUATION COMPLETE. Score: ${grade.score.toFixed(3)}/1.000`, 'success');
                document.getElementById('rewardValue').textContent = grade.score.toFixed(3);
                
                // Colorize based on score
                const rw = document.getElementById('rewardValue');
                if (grade.score > 0.8) rw.style.color = 'var(--neon-green)';
                else if (grade.score > 0.5) rw.style.color = 'var(--neon-yellow)';
                else rw.style.color = 'var(--neon-red)';
                
            } catch (e) {
                appendLog('Evaluation failed: ' + e.message, 'error');
            }
        }

        function updateTelemetry(obs) {
            // Update Services
            if (obs.system_dashboard) {
                const list = document.getElementById('serviceList');
                list.innerHTML = '';
                
                obs.system_dashboard.forEach(svc => {
                    let stClass = svc.status === 'healthy' ? '' : (svc.status === 'degraded' ? 'degraded' : 'down');
                    
                    const card = document.createElement('div');
                    card.className = `service-card ${stClass}`;
                    card.innerHTML = `
                        <div class="service-header">
                            <div class="service-name">${svc.name}</div>
                            <div class="status-badge">${svc.status}</div>
                        </div>
                        <div class="metrics-grid">
                            <div class="metric-item">
                                <span class="metric-label">CPU Usage</span>
                                <span class="metric-value">${svc.cpu_percent.toFixed(1)}%</span>
                            </div>
                            <div class="metric-item">
                                <span class="metric-label">Memory</span>
                                <span class="metric-value">${svc.memory_percent.toFixed(1)}%</span>
                            </div>
                            <div class="metric-item">
                                <span class="metric-label">Error Rate</span>
                                <span class="metric-value" style="color: ${svc.error_rate_percent > 5 ? 'var(--neon-red)' : 'inherit'}">${svc.error_rate_percent.toFixed(1)}%</span>
                            </div>
                            <div class="metric-item">
                                <span class="metric-label">Latency (p99)</span>
                                <span class="metric-value" style="color: ${svc.latency_p99_ms > 1000 ? 'var(--neon-yellow)' : 'inherit'}">${svc.latency_p99_ms.toFixed(0)}ms</span>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            }
            
            // Update Stats
            if (obs.steps_taken !== undefined) document.getElementById('stepCount').textContent = obs.steps_taken;
            if (obs.sla_remaining_minutes !== undefined) {
                const mins = Math.floor(obs.sla_remaining_minutes);
                const secs = Math.floor((obs.sla_remaining_minutes - mins) * 60);
                const timeStr = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                const timerEl = document.getElementById('slaTimer');
                timerEl.textContent = timeStr;
                
                if (obs.sla_remaining_minutes < 10) timerEl.style.color = 'var(--neon-yellow)';
                if (obs.sla_remaining_minutes < 5) timerEl.style.color = 'var(--neon-red)';
                if (obs.sla_remaining_minutes >= 10) timerEl.style.color = 'var(--neon-green)';
            }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
